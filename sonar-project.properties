#
# ==============================================================================
# =
# SonarCloud Configuration for typedoc-plugin-docusaurus-doc-links
#
# ==============================================================================
# =

sonar.organization = nick2bad4u
sonar.projectKey = Nick2bad4u_typedoc-plugin-docusaurus-doc-links
sonar.projectName = typedoc-plugin-docusaurus-doc-links
sonar.host.url = https://sonarcloud.io

sonar.sources = src
sonar.tests = test

sonar.exclusions = \
    **/.\
    github/**,**/docs/**,**/scripts/**,**/node_modules/**,**/dist/**,**/coverage\
    /**,**/build/**,**/temp/**,**/*.config.*,**/*.d.ts,**/*.d.mts,eslint.config.\
    mjs,stylelint.config.mjs
sonar.cpd.exclusions = \
    test/**,tests/**,**/test/**,**/tests/**,scripts/**,**/scripts/**,docs/**,**/\
    docs/**,eslint.config.mjs
sonar.test.inclusions = test/**,tests/**,**/test/**,**/tests/**
sonar.test.exclusions = **/test/fixtures/**,**/snapshots/**

sonar.typescript.file.suffixes = .ts,.tsx,.mts,.cts
sonar.javascript.file.suffixes = .js,.jsx,.mjs,.cjs
sonar.typescript.tsconfigPaths = \
    tsconfig.json,tsconfig.build.json,tsconfig.eslint.json

sonar.javascript.lcov.reportPaths = coverage/lcov.info
sonar.coverage.exclusions = \
    test/**,**/test/**,scripts/**,**/scripts/**,docs/**,**/docs/**,**/.\
    github/**,**/*.config.*,**/*.d.ts,**/*.d.mts,eslint.config.mjs

sonar.sourceEncoding = UTF-8
sonar.scm.provider = git
sonar.javascript.detectBundles = true
sonar.qualitygate.wait = true
